name: Edemy Full-Stack CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: BACKEND (SERVER) PIPELINE
  # ==========================================
  server-ci:
    name: Build & Test Server
    runs-on: ubuntu-latest
    
    # Global directory set for this specific job
    defaults:
      run:
        working-directory: ./server

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
        
    - name: Install Server Dependencies (Clean Install)
      run: npm ci
      
    - name: Compile and Run Server Tests
      run: |
        npm run build --if-present
        npm test --if-present

  # ==========================================
  # JOB 2: FRONTEND (CLIENT) PIPELINE
  # ==========================================
  client-ci:
    name: Build & Test Client
    runs-on: ubuntu-latest
    
    # Global directory set for this specific job
    defaults:
      run:
        working-directory: ./client

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
        
    - name: Install Client Dependencies (Clean Install)
      run: npm ci
      
    - name: Compile Next.js/React and Run Tests
      run: |
        npm run build --if-present
        npm test --if-present
